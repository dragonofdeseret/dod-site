<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Photography - Christopher Shenefelt</title>
  <link rel="stylesheet" href="style.css">

  <script defer data-domain="yourdomain.com" src="https://plausible.io/js/script.js"></script>

  <!-- Privacy-friendly analytics by Plausible -->
  <script async src="https://plausible.io/js/pa-uORI5wSFBMhN2n9Rh8Grc.js"></script>
  <script>
    window.plausible = window.plausible || function(){(plausible.q = plausible.q || []).push(arguments)};
    plausible.init = plausible.init || function(i){plausible.o = i || {}};
    plausible.init();
  </script>
</head>

<body>

<div class="layout">

  <nav class="sidebar">
    <h1>Christopher Shenefelt</h1>

    <a href="index.html">Home</a>
    <a href="archive.html">Archive</a>
    <a href="art.html" class="active">Artwork</a>
    <a href="photo.html" class="nav-sub active">Photography</a>
    <a href="writing.html">Writing</a>
    <a href="now.html">Now</a>
    <a href="questions.html">Questions</a>
    <a href="bio.html">Biography</a>
  </nav>

  <main class="content">

    <div class="art-page">

      <h1 id="photo-title"></h1>

      <p id="photo-description"></p>

      <div class="art-navigation" id="photo-nav"></div>

      <div class="photo-viewer">
        <img id="photo-image" alt="">
      </div>

    </div>

  </main>

</div>

<script src="archive.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const item = archive.find(x => x.id === id);

if (item) {
  document.getElementById("photo-title").textContent = item.title;
  document.getElementById("photo-image").src = item.image;
  document.getElementById("photo-image").alt = item.title || "";
  document.getElementById("photo-description").textContent = item.description || "";
}

/* navigation */
const photoItems = archive.filter(x => x.type === "photo");
const index = photoItems.findIndex(x => x.id === id);

const prev = photoItems[index - 1];
const next = photoItems[index + 1];

const from = params.get("from");
const backHref = from === "archive" ? "archive.html" : "photo.html";
const backText = from === "archive" ? "Back to Archive" : "Back to Photography";

document.getElementById("photo-nav").innerHTML = `
  <div class="nav-left">
    ${prev ? `<a href="photography.html?id=${prev.id}&from=${from || "photo"}">← Previous</a>` : ""}
  </div>
  <div class="nav-center">
    <a href="${backHref}">${backText}</a>
  </div>
  <div class="nav-right">
    ${next ? `<a href="photography.html?id=${next.id}&from=${from || "photo"}">Next →</a>` : ""}
  </div>
`;
</script>

</body>
</html>
