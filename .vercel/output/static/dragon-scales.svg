<!--
  Dragon-scale texture tile. Heraldic fish-scale pattern, used site-wide
  as a subtle background watermark. Tiles seamlessly at 24×24.

  Geometry: a single full scale arcs across the top half (y=0..12),
  apex at (12, 12). The bottom half (y=12..24) holds two half-scales
  whose other halves live in the horizontally-adjacent tiles, giving
  the offset-row look of traditional dragon-scale armor.

  Stroke intentionally muted (`#7a6d44` at 0.32 opacity, hairline 0.6px)
  so the pattern is "there" but doesn't compete with body type. To make
  it more / less visible, adjust the stroke color or the opacity in
  this single file — the rest of the site uses it via /dragon-scales.svg.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
  <g fill="none" stroke="#7a6d44" stroke-width="0.6" opacity="0.32" stroke-linecap="round">
    <!-- Top-row full scale, centered at x=12 -->
    <path d="M 0 0 Q 12 24 24 0" />
    <!-- Bottom-row scales: halves at the left + right edges of the tile.
         The "other halves" are supplied by the next tile over. -->
    <path d="M -12 12 Q 0 36 12 12" />
    <path d="M 12 12 Q 24 36 36 12" />
  </g>
</svg>
