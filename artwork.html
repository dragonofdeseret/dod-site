<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Artwork - Christopher Shenefelt</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

  <nav class="sidebar">
    <h1>Christopher Shenefelt</h1>

    <a href="index.html">Home</a>
    <a href="archive.html">Archive</a>
    <a href="art.html" class="active">Artwork</a>
    <a href="writing.html">Writing</a>
    <a href="now.html">Now</a>
    <a href="questions.html">Questions</a>
    <a href="bio.html">Biography</a>
  </nav>

  <main class="content">

    <div class="art-page">

      <h1 id="title"></h1>

      <p id="description"></p>

      <div class="art-navigation" id="nav"></div>

      <div class="art-image">
        <img id="image" alt="">
      </div>

    </div>

  </main>

</div>

<script src="archive.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const from = params.get("from") || "art";

/* only include visible artwork */
const artItems = archive
  .filter(x => x.type === "art" && x.showOnArt !== false)
  .sort((a, b) => {
    const dateDiff = new Date(b.date) - new Date(a.date);
    if (dateDiff !== 0) return dateDiff;

    const getIndex = value => {
      const match = String(value || "").match(/_(\d+)$/);
      return match ? parseInt(match[1], 10) : 0;
    };

    return getIndex(a.id) - getIndex(b.id);
  });

const index = artItems.findIndex(x => x.id === id);

/* strict mode: hidden or invalid ids do not render */
if (index === -1) {
  window.location.href = from === "archive" ? "archive.html" : "art.html";
} else {
  const item = artItems[index];
  const prev = artItems[index - 1];
  const next = artItems[index + 1];

  document.getElementById("title").textContent = item.title || "";
  document.getElementById("image").src = item.image;
  document.getElementById("image").alt = item.title || "";
  document.getElementById("description").textContent = item.description || "";

  const backHref = from === "archive" ? "archive.html" : "art.html";
  const backText = from === "archive" ? "Back to Archive" : "Back to Art";

  document.getElementById("nav").innerHTML = `
    <div class="nav-left">
      ${prev ? `<a href="artwork.html?id=${prev.id}&from=${from}">← Previous</a>` : ""}
    </div>
    <div class="nav-center">
      <a href="${backHref}">${backText}</a>
    </div>
    <div class="nav-right">
      ${next ? `<a href="artwork.html?id=${next.id}&from=${from}">Next →</a>` : ""}
    </div>
  `;

  document.addEventListener("keydown", e => {
    if (e.key === "ArrowLeft" && prev) {
      window.location.href = `artwork.html?id=${prev.id}&from=${from}`;
    }
    if (e.key === "ArrowRight" && next) {
      window.location.href = `artwork.html?id=${next.id}&from=${from}`;
    }
  });
}
</script>

</body>
</html>
